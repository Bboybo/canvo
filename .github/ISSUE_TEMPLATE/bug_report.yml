name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Canvo
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: input
    id: device
    attributes:
      label: Device
      description: What device are you using?
      placeholder: "e.g. Samsung Galaxy S24, Pixel 8 Pro"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android Version
      description: What version of Android are you running?
      placeholder: "e.g. Android 14, Android 15"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Canvo Version
      description: Found in Settings → About
      placeholder: "e.g. 0.9.0-beta.6"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: AI Provider
      description: Which AI provider were you using when the bug occurred?
      options:
        - Google Gemini (Google OAuth)
        - Google Gemini (API Key)
        - Anthropic (Claude)
        - OpenAI
        - Groq
        - Mistral
        - OpenRouter
        - Ollama (Local)
        - LM Studio (Local)
        - Other / Custom Endpoint
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what happened
      placeholder: "Tell us what went wrong..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Open the app
        2. Go to '...'
        3. Tap on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: If applicable, add screenshots or a screen recording to help explain the problem.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Debug Logs
      description: If available, paste any error messages or debug logs from Settings → Debug
      render: shell
    validations:
      required: false
